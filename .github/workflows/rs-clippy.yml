name: Native Clippy

on:
  push:
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/clippy.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/clippy.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-clippy:
    name: rust-clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-src-dir: ./nativews
          components: clippy

      - name: Fetch
        working-directory: ./nativews
        run: cargo fetch

      - name: Check
        working-directory: ./nativews
        run: cargo check

      - name: Clippy
        working-directory: ./nativews
        run: cargo clippy --all-targets --all-features -- -D warnings
